---
apiVersion: v1
kind: Service
metadata:
  name: petclinic
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: petclinic

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
  labels:
    app: petclinic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
        azure.workload.identity/use: "true"
    spec:
      # Use the service account created by Azure Service Connector
      # This service account is federated with the Azure Managed Identity
      serviceAccountName: sc-account-acda3ed9-e3d0-4f77-8887-37e2db05f5df
      nodeSelector:
        kubernetes.io/os: linux
      containers:
        - name: workload
          # Update this image to point to your ACR
          # acrpetclinic189769.azurecr.io/petclinic:0.0.2
          image: acrpetclinic189769.azurecr.io/petclinic:0.0.2
          env:
            # Enable the PostgreSQL profile for Spring Boot
            - name: SPRING_PROFILES_ACTIVE
              value: postgres
            
            # Azure PostgreSQL connection details from Service Connector secret
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_CONNECTIONSTRING
                  optional: true
            
            # Alternative: Construct connection URL from individual components
            - name: AZURE_POSTGRESQL_HOST
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_HOST
            
            - name: AZURE_POSTGRESQL_PORT
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_PORT
            
            - name: AZURE_POSTGRESQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_DATABASE
            
            - name: AZURE_POSTGRESQL_USERNAME
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_USERNAME
            
            - name: AZURE_POSTGRESQL_CLIENTID
              valueFrom:
                secretKeyRef:
                  name: sc-pg-secret
                  key: AZURE_POSTGRESQL_CLIENTID
            
            # Enable Azure Managed Identity authentication
            - name: SPRING_CLOUD_AZURE_CREDENTIAL_MANAGED_IDENTITY_ENABLED
              value: "true"
            
            # Enable passwordless authentication for Azure PostgreSQL
            - name: SPRING_DATASOURCE_AZURE_PASSWORDLESS_ENABLED
              value: "true"
            
            # Spring Boot health probes configuration
            - name: SPRING_APPLICATION_JSON
              value: |
                {
                  "management.endpoint.health.probes.add-additional-paths": true
                }
          
          ports:
            - name: http
              containerPort: 8080
          
          # Resource limits and requests
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          
          # Health probes
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
