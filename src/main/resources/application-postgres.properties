# database init, supports postgres too
database=postgres

# Azure PostgreSQL with Managed Identity Configuration
# Update the URL to point to your Azure Database for PostgreSQL Flexible Server:
# Format: jdbc:postgresql://<your_server>.postgres.database.azure.com:5432/<your_database>?sslmode=require
spring.datasource.url=jdbc:postgresql://${AZURE_POSTGRESQL_HOST:localhost}:${AZURE_POSTGRESQL_PORT:5432}/${AZURE_POSTGRESQL_DATABASE:petclinic}?sslmode=require

# Managed Identity Configuration
# Replace <your_managed_identity_name> with your Azure Managed Identity name
spring.datasource.username=${AZURE_POSTGRESQL_USERNAME:<your_managed_identity_name>}

# Enable Azure Managed Identity authentication (passwordless)
spring.cloud.azure.credential.managed-identity-enabled=true
spring.datasource.azure.passwordless-enabled=true

# If you are deploying to an Azure sovereign cloud rather than the public cloud, set the following properties with one value from the option list, or override with environment variables.
# spring.cloud.azure.profile.cloud-type = azure_china / azure_germany / azure_us_government / azure
# spring.datasource.azure.scopes = (one-of-the-following-values)
#     - azure_china: https://ossrdbms-aad.database.chinacloudapi.cn/.default
#     - azure_germany: https://ossrdbms-aad.database.cloudapi.de/.default
#     - azure_us_government: https://ossrdbms-aad.database.usgovcloudapi.net/.default
#     - azure: https://ossrdbms-aad.database.windows.net/.default

# SQL is written to be idempotent so this is safe
spring.sql.init.mode=always
